name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # opencv needs headless build on CI (no display); deps are test-only.
          pip install opencv-python-headless numpy pyyaml matplotlib pytest ruff

      - name: Lint
        run: ruff check .

      - name: Run tests
        # Tests mock Ultralytics, so the heavy model is never downloaded.
        run: pytest -q
