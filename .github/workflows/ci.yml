name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false      # run all Python versions even if one fails
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # opencv needs the headless build on CI (no display attached).
          # ruff is pinned so lint behavior is deterministic across runs.
          pip install opencv-python-headless numpy pyyaml matplotlib pytest "ruff==0.6.9"

      - name: Lint
        run: ruff check .

      - name: Run tests
        # Tests mock Ultralytics, so the heavy model is never downloaded.
        run: pytest -q
